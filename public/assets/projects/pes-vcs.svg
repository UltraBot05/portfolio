<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <style>
      .bg { fill: #0d0d1a; }
      .titlebar { fill: #1a1a2e; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .title-text { fill: #8899aa; font-family: monospace; font-size: 11px; }
      .line { font-family: 'Courier New', monospace; font-size: 11.5px; }
      .amber { fill: #f59e0b; }
      .green { fill: #4ade80; }
      .white { fill: #e8eaf0; }
      .dim { fill: #556677; }
      .yellow { fill: #ffd93d; }
      .blue { fill: #60a5fa; }
      .red { fill: #ff6b6b; }
    </style>
  </defs>

  <rect class="bg" width="600" height="340"/>
  <rect class="titlebar" width="600" height="32"/>
  <circle class="dot-r" cx="16" cy="16" r="6"/>
  <circle class="dot-y" cx="34" cy="16" r="6"/>
  <circle class="dot-g" cx="52" cy="16" r="6"/>
  <text class="title-text" x="300" y="21" text-anchor="middle">pes-vcs — b3ast-vcs log</text>

  <!-- Amber accent bar -->
  <rect fill="#d97706" x="0" y="32" width="600" height="3"/>

  <!-- Prompt + command -->
  <text class="line dim" x="20" y="62">~/pes-vcs $</text>
  <text class="line white" x="98" y="62">b3ast-vcs log --graph</text>

  <!-- Git log style -->
  <text class="line amber" x="20" y="84">commit</text>
  <text class="line yellow" x="72" y="84">a7f3c91b2d4e8f5a1c9b3d7e2f4a8c5b1d9e3f7</text>

  <text class="line dim" x="20" y="100">Author: b3ast &lt;dutta13abhigyan@gmail.com&gt;</text>
  <text class="line dim" x="20" y="116">Date:   2026-07-15 22:14:38 +0530</text>
  <text class="line white" x="20" y="136">    implement diff: Myers LCS algorithm, unified output</text>

  <line x1="20" y1="150" x2="580" y2="150" stroke="#1e2d3d" stroke-width="1"/>

  <text class="line amber" x="20" y="170">commit</text>
  <text class="line yellow" x="72" y="170">3f8a2c5d1b9e4f7a2c8d5b1e9f3a7c4d2b8e5f1</text>

  <text class="line dim" x="20" y="186">Author: b3ast &lt;dutta13abhigyan@gmail.com&gt;</text>
  <text class="line white" x="20" y="206">    add SHA-1 object store: blob, tree, commit · zlib compressed</text>

  <line x1="20" y1="220" x2="580" y2="220" stroke="#1e2d3d" stroke-width="1"/>

  <!-- Object inspect -->
  <text class="line dim" x="20" y="242">$ b3ast-vcs cat-object a7f3c9</text>

  <text class="line blue" x="20" y="260">tree</text>
  <text class="line white" x="52" y="260">5f9b3a  README.md</text>
  <text class="line dim" x="20" y="276">parent  3f8a2c5d1b9e4f7a · author b3ast · 1752599678</text>

  <!-- Stats -->
  <text class="line dim" x="20" y="300">commands: init · add · commit · log · diff · cat-object</text>
  <text class="line green" x="20" y="316">objects: 847 · refs: HEAD→main · index: 23 entries</text>

  <rect fill="#0a0a18" x="0" y="320" width="600" height="20"/>
  <text class="line dim" x="20" y="334">C · SHA-1 · zlib · Git internals</text>
  <text class="line amber" x="490" y="334">● BUILT</text>
</svg>
